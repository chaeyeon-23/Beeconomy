<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비코노미 · 폰 시뮬레이터 데모</title>
    <style>
      :root {
        --bg: #0f1219;
        --panel: #1a1f2e;
        --text: #e8eaef;
        --muted: #8b93a7;
        --accent: #fdd63c;
        --phone-w: 390px;
        --phone-h: 844px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          system-ui,
          sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .layout {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: center;
        gap: 48px;
        padding: 40px 24px 64px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .aside {
        flex: 1 1 280px;
        max-width: 360px;
      }
      .aside h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 12px;
        letter-spacing: -0.02em;
      }
      .aside p {
        color: var(--muted);
        line-height: 1.6;
        margin: 0 0 16px;
        font-size: 0.95rem;
      }
      .aside code {
        background: var(--panel);
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 0.85em;
      }
      .badge {
        display: inline-block;
        background: rgba(253, 214, 60, 0.15);
        color: var(--accent);
        font-size: 0.75rem;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 999px;
        margin-bottom: 16px;
      }
      .phone-wrap {
        flex: 0 0 auto;
        perspective: 1200px;
      }
      .phone {
        width: var(--phone-w);
        height: var(--phone-h);
        background: #000;
        border-radius: 48px;
        padding: 12px;
        box-shadow:
          0 0 0 2px #2a3142,
          0 24px 80px rgba(0, 0, 0, 0.55),
          inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        position: relative;
      }
      .phone::before {
        content: "";
        position: absolute;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 32px;
        background: #000;
        border-radius: 20px;
        z-index: 2;
        pointer-events: none;
      }
      .phone-screen {
        width: 100%;
        height: 100%;
        border-radius: 38px;
        overflow: hidden;
        background: #fff;
      }
      .phone-screen iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      .hint {
        margin-top: 20px;
        text-align: center;
        color: var(--muted);
        font-size: 0.8rem;
        max-width: var(--phone-w);
      }
      @media (max-width: 900px) {
        .layout {
          flex-direction: column;
          align-items: center;
        }
        .aside {
          text-align: center;
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="aside">
        <span class="badge">로컬 데모</span>
        <h1>비코노미 폰 시뮬레이터</h1>
        <p>
          오른쪽 프레임은 실제 앱(<code>index.html</code>)을 iframe으로 띄운 미리보기예요. 터미널에서
          <code>npm run dev</code> 를 켠 뒤 이 페이지를 열어 주세요.
        </p>
        <p>
          주소:
          <code id="demo-url">…</code>
        </p>
        <p style="margin-top: 24px; font-size: 0.85rem">
          앱인토스 샌드박스·토스앱과는 별개로, 브라우저에서 레이아웃만 빠르게 볼 때 쓰면 됩니다.
        </p>
      </aside>
      <div class="phone-wrap">
        <div class="phone" aria-label="모바일 미리보기 프레임">
          <div class="phone-screen">
            <iframe
              id="app-frame"
              title="비코노미 앱"
              src="/"
              loading="lazy"
            ></iframe>
          </div>
        </div>
        <p class="hint">iPhone 14 Pro 근처 뷰포트(390×844) 기준입니다.</p>
      </div>
    </div>
    <script>
      var u = window.location.origin + "/simulator-demo.html";
      document.getElementById("demo-url").textContent = u;
    </script>
  </body>
</html>
